<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Résultats Courses</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="app-header">
    <h1>Résultats des Courses</h1>
  </header>

  <main class="container">

    <section class="course-info">

      <div class="field">
        <label>Date</label>
        <input type="date" id="date">
      </div>

      <div class="field">
        <label>Épreuve</label>
        <input type="text" id="epreuve" placeholder="Ex : Meeting printemps">
      </div>

      <div class="field">
        <label>Distance</label>
        <input type="text" id="distance" placeholder="Ex : 5000 m">
      </div>

    </section>

    <section class="grid-section">

      <table id="resultsTable">
        <thead>
          <tr>
            <th>Classement</th>
            <th>Nom</th>
            <th>Temps</th>
            <th>Distinction</th>
            <th></th>
          </tr>
        </thead>

       <tbody id="resultsBody" contenteditable="false"></tbody>

      </table>

      <button id="addRowBtn">+ Ajouter une ligne</button>

    </section>

    <section class="actions">

<button id="saveBtn">💾 Enregistrer dans NocoDB</button>
    </section>

  </main>

  <script src="js/app.js"></script>

</body>
</html>
